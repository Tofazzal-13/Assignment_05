<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- daisy and tailwind added -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google font link -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- font-awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- css added -->
    <link rel="stylesheet" href="css/style.css">

    <title>Main page</title>

</head>

<body>

    <header class="bg-[#FFFFFF] shadow-xl">
        <section class="w-11/12 mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2 p-4">
                <img src="./assets/github-logo.png" class="w-[50px]" alt="">
                <h2 class="text-2xl font-bold">GitHub Issues Tracker</h2>
            </div>
            <div class="flex gap-2">
                <input id="searchInput" type="text" placeholder="Search issue" class="input input-bordered" />

                <button onclick="searchIssue()" class="btn btn-primary rounded-xl ">+ New Issue</button>
            </div>
        </section>
    </header>

    <main>
        <!-- category button  -->
        <section class="w-10/12 border border-gray-100  mx-auto mt-20 p-4 rounded-xl bg-[#FFFFFF] shadow-xl">
            <button id="allBtn" onclick="loadCategories()" class="btn btn-outline btn-primary">All</button>
            <button id="openBtn" onclick="loadOpenIssues()" class="btn btn-outline btn-primary">Open</button>
            <button id="closedBtn" onclick="loadClosedIssues()" class="btn  btn-outline btn-primary">Close</button>

        </section>
        <!-- display category -->
        <section class="w-10/12 border border-gray-100  mx-auto mt-10  rounded-xl bg-[#FFFFFF] shadow-xl">
            <div class="flex justify-between items-center p-4">
                <div class="flex gap-2 items-center">
                    <div>
                        <img src="./assets/Aperture.png" alt="">
                    </div>
                    <div>
                        <h4 class="text-xl font-semibold"><span id="issueCount">0</span> Issues</h4>
                        <p class="text-[#64748B]">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex gap-4">
                    <div class="flex items-center gap-2">
                        <i class="fa-solid fa-circle text-green-400"></i>
                        <p class="font-semibold">open</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <i class="fa-solid fa-circle text-red-400"></i>
                        <p class="font-semibold">close</p>
                    </div>
                </div>
            </div>
            <hr class="text-gray-400">
            <!-- cards -->
            <div id="categoryContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 p-6"></div>

            <!-- Modal -->

            <dialog id="issueModal" class="modal">

                <div class="modal-box">

                    <button onclick="closeModal()"
                        class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button>

                    <div id="modalData"></div>

                </div>

            </dialog>
        </section>
    </main>
    <!-- js added  -->
    <script src="js/script.js"></script>
</body>

</html>
